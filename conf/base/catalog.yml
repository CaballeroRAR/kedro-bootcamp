# Credit Risk Project Catalog
# Layer: 01_raw

raw_credit_data:
  type: kedro_datasets.polars.ExcelDataset
  filepath: gs://credit-risk-analytics/01_raw/default_of_credit_card_clients.xls 
  load_args:
    header: 1
    engine: fastexcel

# Layer: 02_intermediate
intermediate_credit_data:
  type: kedro_datasets.polars.LazyPolarsDataset
  filepath: gs://credit-risk-analytics/02_intermediate/credit_data_cleaned.parquet
  file_format: parquet

# Layer: 07_model_output
catboost_model:
  type: pickle.PickleDataset
  filepath: gs://credit-risk-analytics/07_model_output/catboost_model.pkl
  backend: joblib

# Layer: 08_reporting
catboost_metrics:
  type: json.JSONDataset
  filepath: gs://credit-risk-analytics/08_reporting/catboost_metrics.json

catboost_calibration:
  type: json.JSONDataset
  filepath: gs://credit-risk-analytics/08_reporting/catboost_calibration.json
