# Credit Risk Project Catalog
# Layer: 01_raw

raw_credit_data:
  type: pandas.ExcelDataset
  filepath: gs://credit-risk-analytics/01_raw/default_of_credit_card_clients.xls # This is the initial raw data for the project stored in GCS 
  load_args:
    header: 1

# Layer: 02_intermediate
intermediate_credit_data:
  type: polars.ParquetDataset
  filepath: gs://credit-risk-analytics/02_intermediate/credit_data_cleaned.parquet
