# Credit Risk Project Catalog
# Layer: 01_raw

raw_credit_data:
  type: pandas.ExcelDataset
  filepath: data/01_raw/default of credit card clients.xls
  load_args:
    header: 1
    engine: xlrd

# Layer: 02_intermediate
intermediate_credit_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/credit_data_cleaned.parquet

boost_ready_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/boost_ready_data.parquet

# Layer: 04_feature
# Generic splits per model (Raw split)
train_split_catboost:
  type: pandas.ParquetDataset
  filepath: data/04_feature/train_split_catboost.parquet

test_split_catboost:
  type: pandas.ParquetDataset
  filepath: data/04_feature/test_split_catboost.parquet

train_split_xgboost:
  type: pandas.ParquetDataset
  filepath: data/04_feature/train_split_xgboost.parquet

test_split_xgboost:
  type: pandas.ParquetDataset
  filepath: data/04_feature/test_split_xgboost.parquet

train_split_ann:
  type: pandas.ParquetDataset
  filepath: data/04_feature/train_split_ann.parquet

test_split_ann:
  type: pandas.ParquetDataset
  filepath: data/04_feature/test_split_ann.parquet

# Layer: 05_model_input
# Final data ready for training
train_ready_catboost:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/train_ready_catboost.parquet

train_ready_xgboost:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/train_ready_xgboost.parquet

train_ready_ann:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/train_ready_ann.parquet

test_ready_ann:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/test_ready_ann.parquet

# ANN Scaler
fitted_scaler_ann:
  type: pickle.PickleDataset
  filepath: data/05_model_input/fitted_scaler_ann.pkl

# Layer: 07_model_output
catboost_model:
  type: pickle.PickleDataset
  filepath: data/07_model_output/catboost_model.pkl
  backend: joblib

xgboost_model:
  type: pickle.PickleDataset
  filepath: data/07_model_output/xgboost_model.pkl
  backend: joblib

ann_model:
  type: pickle.PickleDataset
  filepath: data/07_model_output/ann_model.pkl
  backend: joblib

# Layer: 08_reporting
catboost_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/catboost_metrics.json

xgboost_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/xgboost_metrics.json

ann_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/ann_metrics.json
