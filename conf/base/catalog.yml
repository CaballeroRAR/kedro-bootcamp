# Credit Risk Project Catalog
# Layer: 01_raw

raw_credit_data:
  type: pandas.ExcelDataset
  filepath: gs://credit-risk-analytics/01_raw/default_of_credit_card_clients.xls 
  load_args:
    header: 1
    engine: xlrd

# Layer: 02_intermediate
intermediate_credit_data:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/credit_data_cleaned.parquet

# Layer: 05_model_input
X_train_balanced_catboost:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train_balanced_catboost.parquet

X_test_catboost:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_test_catboost.parquet

# Layer: 07_model_output
catboost_model:
  type: pickle.PickleDataset
  filepath: data/07_model_output/catboost_model.pkl
  backend: joblib

# Layer: 08_reporting
catboost_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/catboost_metrics.json

catboost_calibration:
  type: json.JSONDataset
  filepath: data/08_reporting/catboost_calibration.json
