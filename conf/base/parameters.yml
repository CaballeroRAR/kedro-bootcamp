# Credit Risk Project Parameters
# Project: Prometheus

features:
  numerical:
    - X1   # Amount of given credit
    - X5   # Age
    - X12  # Bill Statement Sept
    - X13  # Bill Statement Aug
    - X14  # Bill Statement July
    - X15  # Bill Statement June
    - X16  # Bill Statement May
    - X17  # Bill Statement April
    - X18  # Previous Payment Sept
    - X19  # Previous Payment Aug
    - X20  # Previous Payment July
    - X21  # Previous Payment June
    - X22  # Previous Payment May
    - X23  # Previous Payment April
  categorical:
    - X2   # Gender
    - X3   # Education
    - X4   # Marital Status
    - X6   # Repayment Sept
    - X7   # Repayment Aug
    - X8   # Repayment July
    - X9   # Repayment June
    - X10  # Repayment May
    - X11  # Repayment April

target: default_payment_next_month

modeling:
  train_fraction: 0.8
  random_seed: 42
  
  catboost:
    iterations: 1000
    learning_rate: 0.05
    depth: 6
    loss_function: Logloss
    eval_metric: AUC
    early_stopping_rounds: 50
    verbose: 100
    allow_writing_files: false

  xgboost:
    n_estimators: 1000
    learning_rate: 0.05
    max_depth: 6
    objective: binary:logistic
    eval_metric: auc
    early_stopping_rounds: 50
    verbosity: 0

evaluation:
  metrics:
    - auc
    - brier_score
    - log_loss
  calibration:
    bins: 10
    method: sigmoid  # for post-hoc calibration if needed